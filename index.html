  <title>Óptica PRO · Configurador</title>
  <style>
/* ================================================================
   ÓPTICA PRO — Tokens de diseño y animaciones base
================================================================ */
:root {
  --font:          -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  --color-bg:      #F0EFF8;
  --color-surface: #ffffff;
  --color-alt:     #f7f6f3;
  --color-border:  #e0ddd8;
  --color-border2: #f0ede8;
  --color-text:    #1a1a1a;
  --color-text2:   #555;
  --color-muted:   #999;
  --color-primary: #534AB7;
  --color-primary-light: #EEEDFE;
  --color-ok:      #0F6E56;
  --color-ok-bg:   #f0fdf4;
  --color-err:     #e24b4a;
  --color-err-bg:  #fef2f2;
  --shadow:        0 2px 16px rgba(0,0,0,0.07);
  --shadow-lg:     0 4px 24px rgba(0,0,0,0.11);
  --r:             14px;
  --touch:         56px;  /* touch target mínimo */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--color-bg);
  font-family: var(--font);
  color: var(--color-text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overscroll-behavior: none;
}

button { font-family: var(--font); }

/* ── Animaciones ─────────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

.anim-fade-up  { animation: fadeUp  .22s ease-out both; }
.anim-scale-in { animation: scaleIn .20s ease-out both; }

.d1 { animation-delay: .04s; }
.d2 { animation-delay: .08s; }
.d3 { animation-delay: .12s; }
.d4 { animation-delay: .16s; }
.d5 { animation-delay: .20s; }
.d6 { animation-delay: .24s; }

/* ── Safe area insets para iPhone X+ (notch y home bar) ──────── */
/* env() proporciona el espacio que iOS reserva para el sistema */

body {
  /* Padding inferior para la home bar del iPhone */
  padding-bottom: env(safe-area-inset-bottom);
}

/* El header sticky ya ocupa la zona del notch porque usamos
   black-translucent en el status bar y el header tiene
   background color que llega hasta el borde */
header[style*="position: sticky"],
header[style*="position:sticky"] {
  padding-top: max(12px, env(safe-area-inset-top));
}

/* Navegación dev — no necesita safe area */
nav { padding-bottom: 0 !important; }

/* Overlay de gerencia — cubre toda la pantalla incluyendo safe areas */
[data-gerencia-overlay] {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

  </style>

// ── Clasificación de motivo de inactividad ────────────────────────
function getMotivo(item) {
  const hoja = String(item.HOJA_ORIGEN || '').trim()
  const id   = String(item.ID_PACK_ITEM || '')

  if (hoja.includes('DESCARTADA')) {
    return {
      label: 'Histórico · Pack descartado',
      bg:    '#F1F5F9',
      color: '#475569',
      icon:  '🗄',
    }
  }
  if (id.includes('COLOR')) {
    return {
      label: 'Pendiente de definición',
      bg:    '#FFFBEB',
      color: '#B06000',
      icon:  '⏳',
    }
  }
  if (hoja === 'PRODUCTOS PRO') {
    return {
      label: 'Solo referencia comercial',
      bg:    '#F5F3FF',
      color: '#6D28D9',
      icon:  '📋',
    }
  }
  return {
    label: 'Inactivo',
    bg:    '#F8F8F8',
    color: '#888',
    icon:  '○',
  }
}

function ItemsInactivos({ onVolver }) {
  const { data } = useData()

  // Todos los ítems con ACTIVO=NO del allPacks
  const inactivos = useMemo(
    () => (data?.allPacks || []).filter(
      (p) => String(p.ACTIVO || '').trim().toUpperCase() === 'NO'
    ),
    [data?.allPacks]
  )

  // Agrupar por HOJA_ORIGEN
  const grupos = useMemo(() => {
    const g = {}
    for (const item of inactivos) {
      const k = String(item.HOJA_ORIGEN || '').trim() || '(Sin grupo)'
      if (!g[k]) g[k] = []
      g[k].push(item)
    }
    return g
  }, [inactivos])

  // Conteo de motivos
  const porMotivo = useMemo(() => {
    const m = { historico: 0, pendiente: 0, referencia: 0, otro: 0 }
    for (const item of inactivos) {
      const mot = getMotivo(item)
      if (mot.label.includes('descartado'))  m.historico++
      else if (mot.label.includes('Pendiente')) m.pendiente++
      else if (mot.label.includes('referencia')) m.referencia++
      else m.otro++
    }
    return m
  }, [inactivos])

  return (
    <div style={s.page}>

      {/* Header */}
      <header style={s.header}>
        <button onClick={onVolver} style={s.backBtn}>‹ Dashboard</button>
        <div>
          <p style={s.headerTitle}>Histórico e inactivos</p>
          <p style={s.headerSub}>{inactivos.length} ítems · ACTIVO = NO</p>
        </div>
      </header>

      <div style={s.content}>

        {/* Resumen de motivos */}
        <div style={s.resumenCard}>
          <p style={s.secLabel}>Por motivo</p>
          <div style={s.motivoRow}>
            {[
              { icon: '🗄', label: 'Histórico',          n: porMotivo.historico  },
              { icon: '⏳', label: 'Pendiente definición', n: porMotivo.pendiente  },
              { icon: '📋', label: 'Solo referencia',    n: porMotivo.referencia },
              { icon: '○',  label: 'Otros',              n: porMotivo.otro       },
            ].filter((m) => m.n > 0).map((m) => (
              <div key={m.label} style={s.motivoChip}>
                <span>{m.icon}</span>
                <div>
                  <p style={{ fontSize: 18, fontWeight: 800, color: '#1a1a1a', margin: 0, letterSpacing: '-0.03em' }}>{m.n}</p>
                  <p style={{ fontSize: 10, color: '#888', margin: 0 }}>{m.label}</p>
                </div>
              </div>
            ))}
          </div>
          <p style={s.aviso}>
            ⚠️ Para reactivar un ítem: cambiar ACTIVO=NO a ACTIVO=SI en el Excel y recargar la app.
          </p>
        </div>

        {/* Ítems agrupados */}
        {Object.entries(grupos).map(([origen, items]) => (
          <div key={origen} style={s.grupoCard}>
            <div style={s.grupoHeader}>
              <p style={s.grupoNombre}>{origen}</p>
              <span style={s.grupoCount}>{items.length} ítem{items.length > 1 ? 's' : ''}</span>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {items.map((item) => {
                const motivo = getMotivo(item)
                return (
                  <div key={item.ID_PACK_ITEM} style={s.itemRow}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={s.itemNombre}>{item.PRODUCTO_COMERCIAL}</p>
                      <p style={s.itemId}>{item.ID_PACK_ITEM}</p>
                    </div>
                    <span style={{ ...s.motivoPill, background: motivo.bg, color: motivo.color }}>
                      {motivo.icon} {motivo.label}
                    </span>
                  </div>
                )
              })}
            </div>
          </div>
        ))}

        {inactivos.length === 0 && (
          <div style={s.empty}>
            <p>No hay ítems inactivos. Todos los ítems del Excel tienen ACTIVO=SI.</p>
          </div>
        )}

      </div>
    </div>
  )
}

  const indices = useMemo(() =>
    packItem ? getIndicesDisponibles(packItemId, packItem, data) : []
  , [packItemId, data])

    packItem ? getTratamientosDisponibles(packItemId, packItem, indice || null, data) : []
  , [packItemId, packItem, indice, data])

  const grupos = useMemo(() => {
    const g = {}
    data.packs.forEach((p) => {

      if (!g[k]) g[k] = []
      g[k].push(p)
    })
    return g
  }, [data.packs])

      flow.irASuplementos()

    <div
      style={{ minHeight: '100vh', background: 'var(--color-bg)', fontFamily: 'var(--font-body)' }}
      // CSS custom property del pack activo (para uso en child components si hace falta)
      data-pack-grupo={flow.packGrupo || ''}
    >

      {/* ── PASO 1: Pack selector (tiene su propia cabecera) ── */}
      {enPaso1 && (
        <PackSelector
          packs={packs}
          onElegir={flow.elegirPack}
          onGerencia={onAccesoGerencia}
        />
      )}

      {/* ── PASOS 2-6: StepHeader + contenido ─────────────── */}
      {!enPaso1 && (
        <>
          <StepHeader
            pasoActual={pasoVisible}
            totalPasos={TOTAL_PASOS_VISIBLES}
            packNombre={visual?.nombre}
            packColor={packColor}
            packColorDark={packColorDark}
            hayAtras={hayAtras}
            onAtras={flow.atras}
            onGerencia={onAccesoGerencia}
          />

          <div style={{ maxWidth: 660, margin: '0 auto' }}>

            {/* Paso 2: Equipamiento */}
            {flow.paso === PASOS.EQUIP && (
              <EquipSelector
                packGrupo={flow.packGrupo}
                packColor={packColor}
                packColorLight={packColorLight}
                packs={packs}
                onElegir={flow.elegirEquip}
              />
            )}

            {/* Paso 3: Producto */}
            {flow.paso === PASOS.PRODUCTO && (
              <ProductoSelector
                packGrupo={flow.packGrupo}
                equipamiento={flow.equipamiento}
                packColor={packColor}
                packColorLight={packColorLight}
                packs={packs}
                onElegir={flow.elegirProducto}
              />
            )}

            {/* Paso 4: Cristal */}
            {flow.paso === PASOS.CRISTAL && packItem && (
              <CristalConfig
                packItem={packItem}
                packItemId={flow.packItemId}
                data={data}
                packColor={packColor}
                packColorLight={packColorLight}
                indice={flow.indice}
                tratamiento={flow.tratamiento}
                onSetIndice={flow.setIndice}
                onSetTratamiento={flow.setTratamiento}
                onConfirmar={handleConfirmarCristal}
              />
            )}

            {/* Paso 5: Suplementos */}
            {flow.paso === PASOS.SUPLEMENTOS && (
              <SuplementoSelector
                packGrupo={flow.packGrupo}
                equipamiento={flow.equipamiento}
                packColor={packColor}
                packColorLight={packColorLight}
                packs={packs}
                seleccionados={flow.suplementos}
                onToggle={flow.toggleSuplemento}
                onContinuar={handleContinuarSuplementos}
              />
            )}

            {/* Paso 6: Resumen */}
            {flow.paso === PASOS.RESUMEN && (
              <ResumenPedido
                resultado={flow.resultado}
                packGrupo={flow.packGrupo}
                packItem={packItem}
                equipamiento={flow.equipamiento}
                suplementos={flow.suplementos}
                suplementoItems={suplementoItems}
                packColor={packColor}
                packColorLight={packColorLight}
                packColorDark={packColorDark}
                onNuevoPedido={flow.reiniciar}
              />
            )}

          </div>
        </>
      )}
    </div>
  )
}
